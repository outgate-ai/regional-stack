name: Build and Push Images

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: ${{ startsWith(github.ref, 'refs/tags/v') && 'prod' || 'dev' }}
    strategy:
      matrix:
        include:
          - service: region-agent
            dockerfile: region-agent/Dockerfile
            context: ./region-agent
            ecr_repo: outgate-region-agent
          - service: log-manager
            dockerfile: services/log-manager/Dockerfile
            context: .
            ecr_repo: outgate-log-manager
          - service: guardrail
            dockerfile: services/guardrail/Dockerfile
            context: .
            ecr_repo: outgate-guardrail

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to ECR Public
        run: |
          aws ecr-public get-login-password --region us-east-1 | \
            docker login --username AWS --password-stdin public.ecr.aws

      - name: Determine tags
        id: tags
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            ECR_PREFIX="public.ecr.aws/f9n7h3c5"
            TAG="latest"
            ENV_LABEL="prod"
          else
            ECR_PREFIX="public.ecr.aws/v6k2g8e3"
            TAG="dev"
            ENV_LABEL="dev"
          fi
          REPO="${ECR_PREFIX}/${{ matrix.ecr_repo }}"
          echo "tags=${REPO}:${TAG},${REPO}:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "env_label=${ENV_LABEL}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          platforms: linux/amd64

      - name: Summary
        run: |
          echo "## ${{ matrix.service }} (${{ steps.tags.outputs.env_label }})" >> "$GITHUB_STEP_SUMMARY"
          echo "\`${{ steps.tags.outputs.tags }}\`" >> "$GITHUB_STEP_SUMMARY"
